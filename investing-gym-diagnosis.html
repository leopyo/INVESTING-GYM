<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자 체력 진단 | INVESTING GYM</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --bg:#FFFFFF; --surface:#F4F5F7; --black:#111214;
  --blue:#1D4ED8; --red:#E4002B; --muted:#6B7280; --line:#E3E5E8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg); color:var(--black); font-family:'Pretendard',sans-serif;
  line-height:1.6; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:640px;margin:0 auto;padding:40px 20px 80px;}

/* top bar */
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.topbar-logo{font-weight:800;font-size:16px;}
.topbar-logo span{color:var(--red);}

/* progress */
.progress-track{height:6px;background:var(--surface);border-radius:100px;overflow:hidden;margin-bottom:36px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--red));border-radius:100px;width:0%;transition:width .3s ease;}
.progress-label{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:8px;}

/* intro */
.intro h1{font-size:30px;font-weight:800;margin-bottom:14px;}
.intro p{color:var(--muted);font-size:15px;margin-bottom:28px;}
.intro-meta{display:flex;gap:24px;margin-bottom:32px;}
.intro-meta div{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted);}
.intro-meta b{display:block;color:var(--black);font-size:18px;font-family:'Pretendard';font-weight:800;}
.btn{
  display:inline-block;background:var(--red);color:#fff;border:none;
  padding:16px 28px;border-radius:100px;font-weight:800;font-size:15px;cursor:pointer;
  transition:transform .15s ease, background .15s ease;
}
.btn:hover{transform:translateY(-2px);background:#C10023;}
.btn-outline{
  background:transparent;color:var(--black);border:1.5px solid var(--line);
  padding:14px 24px;border-radius:100px;font-weight:700;font-size:14px;cursor:pointer;
}
.btn-outline:hover{border-color:var(--black);}

/* question card */
.q-section{display:none;}
.q-section.active{display:block;}
.q-category{
  font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--blue);
  letter-spacing:0.06em;margin-bottom:10px;
}
.q-text{font-size:20px;font-weight:800;margin-bottom:22px;line-height:1.4;}
.option{
  display:flex;align-items:center;gap:14px;
  border:1.5px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:12px;
  cursor:pointer;transition:border-color .15s ease, background .15s ease;
}
.option:hover{border-color:var(--blue);background:var(--surface);}
.option.selected{border-color:var(--red);background:#FFF3F0;}
.option-dot{
  width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.option.selected .option-dot{border-color:var(--red);}
.option.selected .option-dot::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--red);}
.option-text{font-size:15px;}
.nav-row{display:flex;justify-content:space-between;margin-top:28px;}

/* result */
.result{display:none;text-align:center;}
.result.active{display:block;}
.gauge-wrap{position:relative;width:260px;height:150px;margin:8px auto 4px;}
.gauge-needle{transform-origin:130px 130px;transition:transform 1.2s cubic-bezier(.2,.9,.25,1);}
.gauge-score{font-size:52px;font-weight:800;margin-top:-10px;}
.gauge-score span{font-size:18px;color:var(--muted);font-weight:400;}
.gauge-tier{
  display:inline-block;margin-top:10px;background:var(--black);color:#fff;
  padding:10px 20px;border-radius:14px;
}
.gauge-tier-main{
  font-size:16px;font-weight:800;font-family:'IBM Plex Mono',monospace;letter-spacing:0.04em;
}
.gauge-tier-sub{
  font-size:12px;color:#B7BBC2;font-family:'Pretendard';font-weight:500;margin-top:2px;
}
.result-desc{color:var(--muted);font-size:15px;margin:20px 0 8px;max-width:480px;margin-left:auto;margin-right:auto;}
.breakdown{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:28px 0;text-align:left;}
.breakdown-card{background:var(--surface);border-radius:14px;padding:18px;}
.breakdown-label{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px;}
.breakdown-bar{height:8px;background:#E3E5E8;border-radius:100px;overflow:hidden;margin-top:8px;}
.breakdown-bar-fill{height:100%;background:var(--blue);border-radius:100px;}
.result-cta{margin-top:32px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
@media (max-width:520px){.breakdown{grid-template-columns:1fr;}}
</style>
</head>

const answers = new Array(questions.length).fill(null);

function startQuiz(){
  document.getElementById('intro').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion();
}

function renderQuestion(){
  const q = questions[current];
  const container = document.getElementById('questions');
  container.innerHTML = `
    <div class="q-category">${q.cat.toUpperCase()}</div>
    <div class="q-text">${q.text}</div>
    ${q.options.map((opt,i)=>`
      <div class="option ${answers[current]===i?'selected':''}" onclick="selectOption(${i})">
        <div class="option-dot"></div>
        <div class="option-text">${opt}</div>
      </div>
    `).join('')}
    <div class="nav-row">
      <button class="btn-outline" onclick="prevQuestion()" ${current===0?'style="visibility:hidden"':''}>이전</button>
      <button class="btn" id="nextBtn" onclick="nextQuestion()" ${answers[current]===null?'disabled style="opacity:0.4;cursor:not-allowed;"':''}>${current===questions.length-1?'결과 보기':'다음'}</button>
    </div>
  `;
  document.getElementById('progressLabel').textContent = `${current+1} / ${questions.length}`;
  document.getElementById('progressFill').style.width = `${((current+1)/questions.length)*100}%`;
}

function selectOption(i){
  answers[current] = i;
  renderQuestion();
}

function nextQuestion(){
  if(answers[current] === null) return;
  if(current < questions.length-1){
    current++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevQuestion(){
  if(current > 0){
    current--;
    renderQuestion();
  }
}

function showResult(){
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').classList.add('active');

  const catScores = {};
  const catCounts = {};
  let total = 0;
  questions.forEach((q,i)=>{
    const pts = answers[i] + 1; // 1~4
    total += pts;
    catScores[q.cat] = (catScores[q.cat]||0) + pts;
    catCounts[q.cat] = (catCounts[q.cat]||0) + 1;
  });

  const maxTotal = questions.length * 4;
  const score = Math.round((total / maxTotal) * 100);

  document.getElementById('scoreNum').innerHTML = `${score}<span> / 100</span>`;

  let tierMain, tierSub, desc;
  if(score < 40){
    tierMain = "BEGINNER"; tierSub = "기초 체력 훈련 중";
    desc = "이제 막 시작하는 단계예요. 기초편부터 차근차근 데일리 루틴을 소화하며 투자 체력을 쌓아보세요.";
  } else if(score < 65){
    tierMain = "ROOKIE"; tierSub = "루틴이 몸에 붙는 단계";
    desc = "기본기는 갖췄지만 꾸준함이 필요해요. 데일리 루틴과 훈련 프로그램 실전편으로 습관을 다져보세요.";
  } else if(score < 85){
    tierMain = "PRO"; tierSub = "근력과 지구력을 갖춤";
    desc = "지식과 리스크 관리 습관이 균형 잡혀 있어요. 전략편으로 한 단계 더 다듬어보세요.";
  } else {
    tierMain = "ELITE"; tierSub = "실전형 올라운더";
    desc = "지식·지구력·자금관리까지 고르게 훈련된 상급자예요. VIP 멤버십의 1:1 진단으로 더 정교하게 관리해보세요.";
  }

  document.getElementById('tierMain').textContent = tierMain;
  document.getElementById('tierSub').textContent = tierSub;
  document.getElementById('resultDesc').textContent = desc;

  const angle = -90 + (score/100)*180;
  document.getElementById('needle').style.transform = `rotate(${angle}deg)`;

  const catNames = {"지식":"투자 지식","리스크관리":"리스크 관리","지구력":"멘탈·지구력","자금계획":"자금 계획"};
  const breakdown = document.getElementById('breakdown');
  breakdown.innerHTML = Object.keys(catScores).map(cat=>{
    const pct = Math.round((catScores[cat] / (catCounts[cat]*4)) * 100);
    return `
      <div class="breakdown-card">
        <div class="breakdown-label">${catNames[cat]}</div>
        <div style="font-weight:800;font-size:20px;">${pct}%</div>
        <div class="breakdown-bar"><div class="breakdown-bar-fill" style="width:${pct}%;"></div></div>
      </div>
    `;
  }).join('');
}

function restartQuiz(){
  current = 0;
  answers.fill(null);
  document.getElementById('result').classList.remove('active');
  document.getElementById('intro').style.display = 'block';
}
</script>
</body>
</html>
